# ====================================================================================================
# ARCHIVO: pubspec.yaml
# CONFIGURACIÓN: Dependencias y Assets del Proyecto - JOSH Security
# ====================================================================================================

name: josh_security
description: "MVP Global Centinela - Aplicación de Seguridad Avanzada"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  file_picker: ^8.1.2
  flutter_dotenv: ^5.2.1
  http: ^1.2.0
  crypto: ^3.0.7
  shared_preferences: ^2.5.5
  permission_handler: ^12.0.3
  flutter_background_service: ^5.1.0
  flutter_local_notifications: ^22.0.1
  provider: ^6.1.5+1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.2

flutter:
  uses-material-design: true
  assets:
    - .env